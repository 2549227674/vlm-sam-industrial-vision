# 纺织品缺陷检测配置
# 适用场景：布料、成衣、织物、服装质量检测

version: "1.0"
metadata:
  name: "纺织品缺陷检测"
  name_en: "Textile Defect Detection"
  industry: "textile"
  author: "System"
  created_at: "2026-01-08"
  description: "针对纺织品制造的典型缺陷检测类型"

primary_types:
  - id: hole
    display_name: "破洞"
    display_name_en: "Hole"
    description: "织物破洞"

  - id: thread_pull
    display_name: "抽丝"
    display_name_en: "Thread Pull"
    description: "纱线抽出、拉丝"

  - id: stain
    display_name: "污渍"
    display_name_en: "Stain"
    description: "油污、水渍、色斑"

  - id: discoloration
    display_name: "色差"
    display_name_en: "Discoloration"
    description: "颜色不均、褪色"

  - id: wrinkle
    display_name: "皱褶"
    display_name_en: "Wrinkle"
    description: "褶皱、折痕"

  - id: seam_defect
    display_name: "缝纫缺陷"
    display_name_en: "Seam Defect"
    description: "缝线问题、跳针、线头"

  - id: pilling
    display_name: "起球"
    display_name_en: "Pilling"
    description: "表面纤维起球"

  - id: snag
    display_name: "勾丝"
    display_name_en: "Snag"
    description: "织物勾挂、拉伤"

  - id: other
    display_name: "其他"
    display_name_en: "Other"
    description: "其他未分类缺陷"

subtypes:
  - id: fabric_like
    display_name: "织物类"
    description: "破洞、抽丝、勾丝"

  - id: surface_like
    display_name: "表面类"
    description: "污渍、起球"

  - id: visual_like
    display_name: "视觉类"
    description: "色差、褪色、皱褶"

  - id: stitching_like
    display_name: "缝纫类"
    description: "缝纫缺陷、线头"

  - id: other
    display_name: "其他"
    description: "其他类型"

prompt_hints:
  fabric: "hole, thread pull, stain, discoloration, snag, torn, ripped"
  stitching: "seam defect, loose thread, skip stitch, broken thread, uneven stitching"
  surface: "wrinkle, pilling, roughness, fuzzing"
  appearance: "color defect, uneven dyeing, fading, color mismatch"

category_aliases:
  holes: hole
  pull: thread_pull
  stains: stain
  color_defect: discoloration
  wrinkles: wrinkle
  seam: seam_defect

validation:
  max_categories: 10
  min_confidence: 0.3
  require_subtype: false

